name: komichi
description: A local e-book reader for PDF and CBZ files.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  pdfx: ^2.9.2
  archive: ^4.0.9
  flutter_riverpod: ^2.6.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  file_picker: ^8.3.7
  go_router: ^14.6.2
  photo_view: ^0.15.0
  uuid: ^4.5.1
  path: ^1.9.0
  crypto: ^3.0.3
  window_manager: ^0.4.2
  docman: ^1.2.0
  package_info_plus: ^9.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  flutter_lints: ^4.0.0
  msix: ^3.16.7

flutter:
  uses-material-design: true
  generate: true

msix_config:
  display_name: komichi
  publisher_display_name: Rhing
  identity_name: Rhing.komichi
  # TODO: Partner Centerでアプリ登録後、発行された実際のPublisher IDに置き換える
  publisher: CN=00000000-0000-0000-0000-000000000000
  msix_version: 1.0.0.0
  logo_path: komichi-icon-512.png
  capabilities: broadFileSystemAccess